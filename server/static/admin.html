<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neural Cars Admin</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #11161c;
      color: #f5f7fa;
    }
    body { margin: 0; min-height: 100vh; background: #11161c; }
    main { max-width: 760px; margin: 0 auto; padding: 32px 24px 48px; }
    h1 { margin: 0 0 24px; font-size: 36px; }
    section { border-top: 1px solid #28323d; padding: 24px 0; }
    label { display: block; color: #aeb9c5; margin-bottom: 8px; font-size: 14px; }
    input, select {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #35414d;
      border-radius: 8px;
      background: #18212b;
      color: #f5f7fa;
      padding: 12px 14px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #3d8bfd;
      color: #ffffff;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-right: 8px;
    }
    button.danger { background: #d94848; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .map-preview {
      border: 1px solid #28323d;
      border-radius: 8px;
      background: #0d1218;
      overflow: hidden;
      margin: 4px 0 16px;
    }
    .preview-head {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 14px;
      color: #cbd5df;
      border-bottom: 1px solid #202a34;
      font-size: 14px;
    }
    .preview-meta { color: #8ea0b3; white-space: nowrap; }
    canvas {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #0a0f14;
    }
    pre {
      min-height: 72px;
      white-space: pre-wrap;
      border: 1px solid #28323d;
      border-radius: 8px;
      background: #0d1218;
      color: #cbd5df;
      padding: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Competition Admin</h1>
    <section>
      <label for="token">Admin token</label>
      <input id="token" type="password" autocomplete="off" placeholder="admin token">
    </section>
    <section>
      <div class="row">
        <div>
          <label for="phase">Active phase</label>
          <select id="phase">
            <option value="personal">personal</option>
            <option value="group">group</option>
          </select>
        </div>
        <div>
          <label>&nbsp;</label>
          <button id="set-phase">Set Active Phase</button>
        </div>
      </div>
    </section>
    <section>
      <label for="personal-map">Personal phase map</label>
      <select id="personal-map"></select>
      <div class="map-preview">
        <div class="preview-head">
          <strong id="personal-preview-title">Map preview</strong>
          <span class="preview-meta" id="personal-preview-meta"></span>
        </div>
        <canvas id="personal-preview" width="1600" height="900"></canvas>
      </div>
      <button data-map-phase="personal">Set Personal Map</button>
    </section>
    <section>
      <label for="group-map">Group phase map</label>
      <select id="group-map"></select>
      <div class="map-preview">
        <div class="preview-head">
          <strong id="group-preview-title">Map preview</strong>
          <span class="preview-meta" id="group-preview-meta"></span>
        </div>
        <canvas id="group-preview" width="1600" height="900"></canvas>
      </div>
      <button data-map-phase="group">Set Group Map</button>
    </section>
    <section>
      <button class="danger" id="reset">Reset Active Phase</button>
      <button id="process">Process Pending Now</button>
    </section>
    <pre id="output">Ready</pre>
  </main>
  <script>
    const token = document.getElementById("token");
    const phase = document.getElementById("phase");
    const personalMap = document.getElementById("personal-map");
    const groupMap = document.getElementById("group-map");
    const output = document.getElementById("output");
    let mapsById = new Map();

    function headers() {
      return {
        "Content-Type": "application/json",
        "X-Admin-Token": token.value
      };
    }

    async function call(url, options) {
      const response = await fetch(url, options);
      const text = await response.text();
      output.textContent = `${response.status} ${response.statusText}\n${text}`;
      await loadState();
    }

    async function loadState() {
      const [stateResponse, mapsResponse] = await Promise.all([
        fetch("/api/state", { cache: "no-store" }),
        fetch("/api/maps", { cache: "no-store" })
      ]);
      const state = await stateResponse.json();
      const maps = await mapsResponse.json();
      mapsById = new Map(maps.map((map) => [map.map_id, map]));
      phase.value = state.active_phase;
      for (const select of [personalMap, groupMap]) {
        select.innerHTML = maps.map((map) => `
          <option value="${map.map_id}">${map.map_id} - ${map.name}</option>
        `).join("");
      }
      personalMap.value = state.personal_map_id;
      groupMap.value = state.group_map_id;
      updateMapPreview("personal");
      updateMapPreview("group");
    }

    function updateMapPreview(mapPhase) {
      const select = mapPhase === "personal" ? personalMap : groupMap;
      const map = mapsById.get(select.value);
      const canvas = document.getElementById(`${mapPhase}-preview`);
      const title = document.getElementById(`${mapPhase}-preview-title`);
      const meta = document.getElementById(`${mapPhase}-preview-meta`);
      const ctx = canvas.getContext("2d");

      if (!map) {
        title.textContent = "No map selected";
        meta.textContent = "";
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }

      title.textContent = `${map.map_id} - ${map.name}`;
      meta.textContent = `${map.checkpoints.length} checkpoints`;

      const image = new Image();
      image.onload = () => {
        canvas.width = image.naturalWidth || 1600;
        canvas.height = image.naturalHeight || 900;
        ctx.drawImage(image, 0, 0, canvas.width, canvas.height);
        drawCheckpointOverlay(ctx, map);
      };
      image.onerror = () => {
        canvas.width = 1600;
        canvas.height = 900;
        ctx.fillStyle = "#0a0f14";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#cbd5df";
        ctx.font = "28px ui-sans-serif, system-ui";
        ctx.fillText("Preview unavailable", 48, 72);
      };
      image.src = `/api/maps/${encodeURIComponent(map.map_id)}/preview`;
    }

    function drawCheckpointOverlay(ctx, map) {
      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.font = "bold 22px ui-sans-serif, system-ui";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (const checkpoint of map.checkpoints) {
        const [ax, ay] = checkpoint.a;
        const [bx, by] = checkpoint.b;
        const [cx, cy] = checkpoint.center;

        ctx.strokeStyle = "rgba(66, 202, 255, 0.88)";
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(ax, ay);
        ctx.lineTo(bx, by);
        ctx.stroke();

        ctx.fillStyle = "rgba(66, 202, 255, 0.95)";
        ctx.beginPath();
        ctx.arc(cx, cy, 12, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "#071018";
        ctx.fillText(String(checkpoint.index + 1), cx, cy);
      }

      const spawn = map.spawn;
      ctx.fillStyle = "rgba(99, 255, 158, 0.95)";
      ctx.strokeStyle = "#071018";
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.arc(spawn.x, spawn.y, 18, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();

      ctx.fillStyle = "#071018";
      ctx.font = "bold 18px ui-sans-serif, system-ui";
      ctx.fillText("S", spawn.x, spawn.y + 1);
      ctx.restore();
    }

    document.getElementById("set-phase").addEventListener("click", () => {
      call("/api/admin/phase", {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({ phase: phase.value })
      });
    });

    document.querySelectorAll("[data-map-phase]").forEach((button) => {
      button.addEventListener("click", () => {
        const mapPhase = button.dataset.mapPhase;
        const mapId = mapPhase === "personal" ? personalMap.value : groupMap.value;
        call("/api/admin/map", {
          method: "POST",
          headers: headers(),
          body: JSON.stringify({ phase: mapPhase, map_id: mapId })
        });
      });
    });

    personalMap.addEventListener("change", () => updateMapPreview("personal"));
    groupMap.addEventListener("change", () => updateMapPreview("group"));

    document.getElementById("reset").addEventListener("click", () => {
      if (!confirm("Reset submissions for the active phase?")) return;
      call("/api/admin/reset", { method: "POST", headers: headers() });
    });

    document.getElementById("process").addEventListener("click", () => {
      call("/api/admin/process-pending", { method: "POST", headers: headers() });
    });

    loadState().catch((error) => {
      output.textContent = `Failed to load state: ${error}`;
    });
  </script>
</body>
</html>
