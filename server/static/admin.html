<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neural Cars Admin</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #11161c;
      color: #f5f7fa;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #11161c;
    }
    main {
      max-width: 720px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }
    h1 {
      margin: 0 0 24px;
      font-size: 36px;
    }
    section {
      border-top: 1px solid #28323d;
      padding: 24px 0;
    }
    label {
      display: block;
      color: #aeb9c5;
      margin-bottom: 8px;
      font-size: 14px;
    }
    input {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #35414d;
      border-radius: 8px;
      background: #18212b;
      color: #f5f7fa;
      padding: 12px 14px;
      font-size: 16px;
      margin-bottom: 12px;
    }
    button {
      border: 0;
      border-radius: 8px;
      background: #3d8bfd;
      color: #ffffff;
      padding: 11px 16px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-right: 8px;
    }
    button.danger {
      background: #d94848;
    }
    pre {
      min-height: 56px;
      white-space: pre-wrap;
      border: 1px solid #28323d;
      border-radius: 8px;
      background: #0d1218;
      color: #cbd5df;
      padding: 14px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Competition Admin</h1>
    <section>
      <label for="token">Admin token</label>
      <input id="token" type="password" autocomplete="off" placeholder="admin token">
    </section>
    <section>
      <button class="danger" id="reset">Reset Competition</button>
    </section>
    <section>
      <label for="submission">Featured submission id</label>
      <input id="submission" type="text" placeholder="sub_1234abcd">
      <button id="feature">Feature Replay</button>
    </section>
    <pre id="output">Ready</pre>
  </main>
  <script>
    const token = document.getElementById("token");
    const submission = document.getElementById("submission");
    const output = document.getElementById("output");

    function headers() {
      return {
        "Content-Type": "application/json",
        "X-Admin-Token": token.value
      };
    }

    async function call(url, options) {
      const response = await fetch(url, options);
      const text = await response.text();
      output.textContent = `${response.status} ${response.statusText}\n${text}`;
    }

    document.getElementById("reset").addEventListener("click", () => {
      if (!confirm("Reset all submissions for this competition?")) return;
      call("/api/admin/reset", {
        method: "POST",
        headers: headers()
      });
    });

    document.getElementById("feature").addEventListener("click", () => {
      call("/api/admin/replay", {
        method: "POST",
        headers: headers(),
        body: JSON.stringify({ submission_id: submission.value })
      });
    });
  </script>
</body>
</html>
