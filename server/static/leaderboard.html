<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neural Cars Competition</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0b1118;
      color: #f4f7fb;
    }
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; background: #0b1118; }
    main { max-width: 1180px; margin: 0 auto; padding: 30px 24px 48px; }
    header { display: flex; align-items: end; justify-content: space-between; gap: 24px; border-bottom: 1px solid #263442; padding-bottom: 20px; }
    h1 { margin: 0; font-size: 38px; line-height: 1; letter-spacing: 0; }
    .eyebrow, .status { color: #96a8ba; font-size: 14px; }
    .status { text-align: right; font-variant-numeric: tabular-nums; }
    .tabs { display: flex; gap: 4px; border-bottom: 1px solid #263442; margin: 24px 0 0; }
    .tab { border: 0; background: transparent; color: #9cadbf; padding: 13px 18px; font: inherit; font-weight: 700; cursor: pointer; border-bottom: 3px solid transparent; }
    .tab.active[data-competition="easy"] { color: #57d3cf; border-color: #57d3cf; }
    .tab.active[data-competition="hard"] { color: #f4b16f; border-color: #f4b16f; }
    .tab.active[data-competition="final"] { color: #d9a8ff; border-color: #d9a8ff; }
    .summary { display: flex; justify-content: space-between; gap: 18px; padding: 18px 0; color: #b8c5d2; font-size: 14px; }
    table { width: 100%; border-collapse: collapse; table-layout: fixed; }
    th, td { border-bottom: 1px solid #1d2935; padding: 15px 12px; text-align: left; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    th { color: #8295a8; font-size: 12px; font-weight: 700; letter-spacing: 0; text-transform: uppercase; }
    tbody tr:first-child { background: #14202b; }
    .rank { width: 72px; color: #aebdcb; font-weight: 800; }
    .name { font-size: 19px; font-weight: 800; }
    .group, .muted { color: #9badbf; }
    .result { font-weight: 800; font-variant-numeric: tabular-nums; }
    .time { font-variant-numeric: tabular-nums; }
    .empty { color: #8ea0b1; text-align: center; padding: 48px 12px; }
    @media (max-width: 680px) {
      main { padding: 22px 14px 34px; }
      header { align-items: start; flex-direction: column; }
      h1 { font-size: 32px; }
      .status { text-align: left; }
      th:nth-child(4), td:nth-child(4) { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <div class="eyebrow">NEURAL CARS COMPETITION</div>
        <h1 id="title">Phase 1 / Easy</h1>
      </div>
      <div class="status" id="status">Connecting...</div>
    </header>
    <nav class="tabs" aria-label="Competition leaderboard">
      <button class="tab active" data-competition="easy">Easy</button>
      <button class="tab" data-competition="hard">Hard</button>
      <button class="tab" data-competition="final">Final</button>
    </nav>
    <div class="summary"><span id="summary">Loading leaderboard</span><span id="next-batch"></span></div>
    <table>
      <thead><tr><th class="rank">Rank</th><th>Player</th><th>Group</th><th>Result</th><th>Completed</th></tr></thead>
      <tbody id="rows"><tr><td colspan="5" class="empty">Waiting for snapshot</td></tr></tbody>
    </table>
  </main>
  <script>
    const rows = document.getElementById("rows");
    const title = document.getElementById("title");
    const statusEl = document.getElementById("status");
    const summary = document.getElementById("summary");
    const nextBatch = document.getElementById("next-batch");
    let activeCompetition = "easy";
    let state = null;
    let lastUpdatedAt = null;

    function escapeHtml(value) { return String(value).replace(/[&<>"']/g, (char) => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#039;"})[char]); }
    function formatTicks(value) {
      const seconds = Number(value) / 30;
      const minutes = Math.floor(seconds / 60);
      return `${minutes}:${(seconds % 60).toFixed(1).padStart(4, "0")}`;
    }
    function resultText(result) {
      return result.completed ? `FINISHED ${formatTicks(result.lap_ticks)}` : `${Number(result.max_progress).toFixed(1)} progress`;
    }
    function countdownText(isoValue) {
      if (!isoValue) return "";
      const remaining = Math.max(0, new Date(isoValue).getTime() - Date.now());
      const totalSeconds = Math.floor(remaining / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = String(totalSeconds % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }
    function renderTiming() {
      if (!state) return;
      const updated = lastUpdatedAt ? `Last updated ${lastUpdatedAt.toLocaleTimeString()}` : "Waiting for update";
      const snapshotAt = state?.config?.next_snapshot_at || state?.config?.next_phase_one_batch_at;
      if (!snapshotAt) {
        nextBatch.textContent = updated;
        return;
      }
      nextBatch.textContent = `Next snapshot in ${countdownText(snapshotAt)} - ${updated}`;
    }
    function render(leaderboard) {
      const stageLabel = activeCompetition === "final" ? "Final / Group" : `Phase 1 / ${activeCompetition[0].toUpperCase()}${activeCompetition.slice(1)}`;
      title.textContent = stageLabel;
      summary.textContent = `${leaderboard.length} ranked submissions`;
      renderTiming();
      if (!leaderboard.length) {
        rows.innerHTML = '<tr><td colspan="5" class="empty">No completed submissions yet</td></tr>';
        return;
      }
      rows.innerHTML = leaderboard.map((item) => `
        <tr>
          <td class="rank">#${item.rank}</td>
          <td><div class="name">${escapeHtml(activeCompetition === "final" ? `Group ${item.group_id}` : item.username)}</div><div class="muted">${escapeHtml(activeCompetition === "final" ? item.username : "individual")}</div></td>
          <td class="group">${escapeHtml(item.group_id)}</td>
          <td class="result">${resultText(item.client_result)}</td>
          <td class="time">${item.completed_at ? new Date(item.completed_at).toLocaleTimeString() : "-"}</td>
        </tr>`).join("");
    }
    async function refresh() {
      const [stateResponse, leaderboardResponse] = await Promise.all([
        fetch("/v2/state", {cache:"no-store"}),
        fetch(`/v2/competitions/${activeCompetition}/leaderboard`, {cache:"no-store"})
      ]);
      state = await stateResponse.json();
      lastUpdatedAt = new Date();
      render(await leaderboardResponse.json());
      statusEl.textContent = `${state.stage.replace("_", " ")} | ${state.config.version}`;
    }
    document.querySelectorAll(".tab").forEach((tab) => tab.addEventListener("click", () => {
      activeCompetition = tab.dataset.competition;
      document.querySelectorAll(".tab").forEach((button) => button.classList.toggle("active", button === tab));
      refresh().catch((error) => { statusEl.textContent = `Disconnected: ${error}`; });
    }));
    function connectWs() {
      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      const ws = new WebSocket(`${protocol}//${location.host}/ws/events`);
      ws.onmessage = (event) => {
        const payload = JSON.parse(event.data);
        if (payload.leaderboards) {
          state = {...state, stage: payload.stage, config: payload.config};
          lastUpdatedAt = new Date();
          render(payload.leaderboards[activeCompetition] || []);
          statusEl.textContent = `${payload.stage.replace("_", " ")} | ${payload.config.version}`;
        }
      };
      ws.onclose = () => setTimeout(connectWs, 3000);
      ws.onerror = () => ws.close();
    }
    refresh().catch((error) => { statusEl.textContent = `Disconnected: ${error}`; });
    connectWs();
    setInterval(renderTiming, 1000);
    setInterval(() => refresh().catch(() => {}), 15000);
  </script>
</body>
</html>
