<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neural Cars Leaderboard</title>
  <style>
    :root {
      color-scheme: dark;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1419;
      color: #f5f7fa;
    }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f1419;
    }
    main {
      max-width: 1180px;
      margin: 0 auto;
      padding: 32px 24px 48px;
    }
    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid #28323d;
      padding-bottom: 20px;
      margin-bottom: 20px;
    }
    h1 {
      margin: 0;
      font-size: 44px;
      line-height: 1.05;
      font-weight: 800;
    }
    .status {
      color: #aeb9c5;
      font-size: 16px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }
    th, td {
      padding: 16px 14px;
      text-align: left;
      border-bottom: 1px solid #202a34;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    th {
      color: #8ea0b3;
      font-size: 13px;
      letter-spacing: 0;
      text-transform: uppercase;
    }
    tbody tr:first-child {
      background: #182430;
    }
    .rank {
      width: 72px;
      color: #aeb9c5;
      font-weight: 700;
    }
    .name {
      font-size: 22px;
      font-weight: 800;
    }
    .score {
      font-variant-numeric: tabular-nums;
      font-weight: 800;
    }
    .tracks {
      color: #b9c5d1;
      font-variant-numeric: tabular-nums;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid #3a4652;
      border-radius: 999px;
      padding: 4px 10px;
      color: #c7d1db;
      font-size: 13px;
    }
    .empty {
      padding: 48px 16px;
      color: #9da9b5;
      text-align: center;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Neural Cars Leaderboard</h1>
      <div class="status" id="status">Connecting...</div>
    </header>
    <table>
      <thead>
        <tr>
          <th class="rank">Rank</th>
          <th>Nickname</th>
          <th>Official Score</th>
          <th>Track Scores</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="rows">
        <tr><td colspan="5" class="empty">Waiting for submissions</td></tr>
      </tbody>
    </table>
  </main>
  <script>
    const rows = document.getElementById("rows");
    const statusEl = document.getElementById("status");

    function scoreText(value) {
      return value === null || value === undefined ? "-" : Number(value).toFixed(1);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function trackScoresText(trackScores) {
      if (!trackScores || trackScores.length === 0) return "-";
      return trackScores.map((track) => scoreText(track.score)).join(" / ");
    }

    async function refresh() {
      try {
        const response = await fetch("/api/leaderboard", { cache: "no-store" });
        const leaderboard = await response.json();
        statusEl.textContent = `Updated ${new Date().toLocaleTimeString()}`;
        if (leaderboard.length === 0) {
          rows.innerHTML = '<tr><td colspan="5" class="empty">Waiting for submissions</td></tr>';
          return;
        }
        rows.innerHTML = leaderboard.map((item, index) => `
          <tr>
            <td class="rank">#${index + 1}</td>
            <td class="name">${escapeHtml(item.nickname)}</td>
            <td class="score">${scoreText(item.official_score)}</td>
            <td class="tracks">${trackScoresText(item.track_scores)}</td>
            <td><span class="pill">${item.status}</span></td>
          </tr>
        `).join("");
      } catch (error) {
        statusEl.textContent = `Disconnected: ${error}`;
      }
    }

    refresh();
    setInterval(refresh, 1000);
  </script>
</body>
</html>
